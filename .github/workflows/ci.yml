name: CI

# Honest scope: this repo has no real automated test suite yet (one ad-hoc
# script, ai_service/test_retrieval.py — not a pytest/JUnit suite). These are
# smoke checks, not test coverage: does every module actually import, does
# Spring Boot compile, does the frontend build. That's still real signal —
# this exact class of error (a stray `Depends(require_api_key)` left behind
# after removing its import, a JSX reference to a deleted component) bit this
# project multiple times in one session before this workflow existed.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  python-import-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ai_service/requirements.txt
      - name: Install system deps (python-magic needs libmagic; pdf2image needs poppler)
        run: sudo apt-get update && sudo apt-get install -y libmagic1 poppler-utils
      - run: pip install -r ai_service/requirements.txt
      - name: Import every router — catches NameError/ImportError at module load
        run: |
          python -c "
          import ai_service.main
          print('ai_service.main imports cleanly — every mounted router loaded without error')
          "
      - name: Unit + smoke tests (pytest — pure functions + app wiring, no external services)
        run: python -m pytest -q

  spring-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: deploy/backend/spring-gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      # `mvn test` compiles AND runs the JUnit unit tests (JwtUtils,
      # FieldEncryptionService — both context-free, no Mongo needed).
      - run: mvn -B test
