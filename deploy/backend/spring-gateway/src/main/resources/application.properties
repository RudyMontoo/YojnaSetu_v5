server.port=${PORT:8080}
spring.application.name=yojna-setu-gateway

# ── MongoDB (replaces PostgreSQL/JPA/Flyway per ADR-001) ──────────────────────
# Atlas Mumbai region in prod; local dev: docker run --name yojna-mongo -p 27017:27017 mongo:7
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017}
spring.data.mongodb.database=${MONGODB_DB:yojnasetu}
# Spring Data MongoDB does NOT create @Indexed/@CompoundIndexes-declared indexes by
# default — without this, OtpSession's TTL index and Application's unique index
# silently don't exist (found the hard way 2026-07-03).
spring.data.mongodb.auto-index-creation=true

# ── JWT (RS256 — see JwtUtils for key loading / dev-fallback behavior) ────────
app.jwt.private-key-path=${JWT_PRIVATE_KEY_PATH:}
app.jwt.public-key-path=${JWT_PUBLIC_KEY_PATH:}
app.jwt.access-token-expiry-minutes=${JWT_ACCESS_EXPIRY_MIN:60}
app.jwt.refresh-token-expiry-days=${JWT_REFRESH_EXPIRY_DAYS:7}

# ── Cookies ─────────────────────────────────────────────────────────────────
# false only for local http:// dev — MUST be true in any deployed environment
app.cookie.secure=${COOKIE_SECURE:false}

# ── Field encryption (AES-256-GCM) ─────────────────────────────────────────────
# Generate with: openssl rand -base64 32 — must match ai_service's FIELD_ENCRYPTION_KEY
encryption.key=${FIELD_ENCRYPTION_KEY:}
encryption.aadhaar-salt=${AADHAAR_SALT:}

# ── Twilio (OTP SMS) — optional in dev, see OtpService ─────────────────────────
twilio.account-sid=${TWILIO_ACCOUNT_SID:}
twilio.auth-token=${TWILIO_AUTH_TOKEN:}
twilio.from-number=${TWILIO_FROM_NUMBER:}

# ── Internal service-to-service key (FastAPI <-> Spring Boot) ─────────────────
app.internal-service-key=${INTERNAL_SERVICE_KEY:}

# ── FastAPI AI Hub URL ──────────────────────────────────────────────────────
app.fastapi.url=${FASTAPI_URL:http://localhost:8000}

# ── CORS ────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:5173},http://localhost:3000

# ── Logging ─────────────────────────────────────────────────────────────────
logging.level.com.yojnasetu=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.data.mongodb=INFO
